<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IA Partículas</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#chat{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:500px;
display:flex;
z-index:10;
}

#chat input{
flex:1;
padding:14px;
border-radius:25px;
border:none;
font-size:16px;
}

#chat button{
margin-left:10px;
padding:14px 20px;
border:none;
border-radius:25px;
background:#00ffff;
font-weight:bold;
}

</style>

</head>

<body>

<div id="chat">

<input id="texto" placeholder="Escribe algo">

<button onclick="enviar()">Enviar</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer = new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

camera.position.z = 5

let controls = new THREE.OrbitControls(camera,renderer.domElement)

controls.enableDamping = true

let particleCount = 7000

let geometry = new THREE.BufferGeometry()

let positions = new Float32Array(particleCount*3)

let spherePositions = []

for(let i=0;i<particleCount;i++){

let radius = 2

let theta = Math.random()*Math.PI*2
let phi = Math.acos((Math.random()*2)-1)

let x = radius*Math.sin(phi)*Math.cos(theta)
let y = radius*Math.sin(phi)*Math.sin(theta)
let z = radius*Math.cos(phi)

positions[i*3]=x
positions[i*3+1]=y
positions[i*3+2]=z

spherePositions.push(x,y,z)

}

geometry.setAttribute(
"position",
new THREE.BufferAttribute(positions,3)
)

let material = new THREE.PointsMaterial({
color:0x00ffff,
size:0.03
})

let particles = new THREE.Points(geometry,material)

scene.add(particles)

function animate(){

requestAnimationFrame(animate)

particles.rotation.y += 0.001

controls.update()

renderer.render(scene,camera)

}

animate()

function enviar(){

let texto = document.getElementById("texto").value

if(!texto) return

let palabras = texto.split(" ")

let i=0

function mostrar(){

if(i>=palabras.length){

volverEsfera()

return

}

formarPalabra(palabras[i])

i++

setTimeout(mostrar,1500)

}

mostrar()

}

function formarPalabra(palabra){

let canvas = document.createElement("canvas")

canvas.width = 800
canvas.height = 200

let ctx = canvas.getContext("2d")

ctx.fillStyle="white"
ctx.font="bold 120px Arial"
ctx.textAlign="center"

ctx.fillText(palabra,400,120)

let data = ctx.getImageData(0,0,800,200).data

let pos = particles.geometry.attributes.position.array

let count=0

for(let y=0;y<200;y+=5){

for(let x=0;x<800;x+=5){

let index=(y*800+x)*4

if(data[index]>200 && count<particleCount){

let i=count*3

pos[i]=(x-400)/100
pos[i+1]=(100-y)/100
pos[i+2]=0

count++

}

}

}

particles.geometry.attributes.position.needsUpdate=true

}

function volverEsfera(){

let pos = particles.geometry.attributes.position.array

for(let i=0;i<particleCount*3;i++){

pos[i]=spherePositions[i]

}

particles.geometry.attributes.position.needsUpdate=true

}

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight

camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>

</html>
