<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IA Partículas</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

/* canvas 3D */
#scene{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* chat */
#chat{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:500px;
display:flex;
z-index:10;
}

#chat input{
flex:1;
padding:14px;
border-radius:25px;
border:none;
font-size:16px;
}

#chat button{
margin-left:10px;
padding:14px 20px;
border:none;
border-radius:25px;
background:#00ffff;
font-weight:bold;
}

</style>

</head>

<body>

<canvas id="scene"></canvas>

<div id="chat">
<input id="texto" placeholder="Escribe algo">
<button id="btnEnviar">Enviar</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<script>

/* ESCENA */

const canvas = document.getElementById("scene")

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z = 5

const renderer = new THREE.WebGLRenderer({
canvas:canvas,
antialias:true
})

renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setClearColor(0x000000)

/* PARTÍCULAS */

const particleCount = 5000

const geometry = new THREE.BufferGeometry()

const positions = new Float32Array(particleCount*3)

const original = []

for(let i=0;i<particleCount;i++){

let r = 2

let theta = Math.random()*Math.PI*2
let phi = Math.acos((Math.random()*2)-1)

let x = r*Math.sin(phi)*Math.cos(theta)
let y = r*Math.sin(phi)*Math.sin(theta)
let z = r*Math.cos(phi)

positions[i*3]=x
positions[i*3+1]=y
positions[i*3+2]=z

original.push(x,y,z)

}

geometry.setAttribute(
"position",
new THREE.BufferAttribute(positions,3)
)

const material = new THREE.PointsMaterial({
color:0x00ffff,
size:0.04
})

const particles = new THREE.Points(geometry,material)

scene.add(particles)

/* ROTACIÓN */

let rotX = 0
let rotY = 0

function animate(){

requestAnimationFrame(animate)

particles.rotation.y += 0.002

renderer.render(scene,camera)

}

animate()

/* BOTÓN ENVIAR */

document.getElementById("btnEnviar").addEventListener("click",function(){

let texto = document.getElementById("texto").value

if(texto==="") return

let palabras = texto.split(" ")

let i=0

function mostrar(){

if(i>=palabras.length){

volverEsfera()

return

}

formarPalabra(palabras[i])

i++

setTimeout(mostrar,1500)

}

mostrar()

})

/* FORMAR PALABRA */

function formarPalabra(word){

let canvas=document.createElement("canvas")
canvas.width=800
canvas.height=200

let ctx=canvas.getContext("2d")

ctx.fillStyle="white"
ctx.font="bold 120px Arial"
ctx.textAlign="center"

ctx.fillText(word,400,130)

let data=ctx.getImageData(0,0,800,200).data

let pos=particles.geometry.attributes.position.array

let count=0

for(let y=0;y<200;y+=6){
for(let x=0;x<800;x+=6){

let index=(y*800+x)*4

if(data[index]>200 && count<particleCount){

let i=count*3

pos[i]=(x-400)/100
pos[i+1]=(100-y)/100
pos[i+2]=0

count++

}

}
}

particles.geometry.attributes.position.needsUpdate=true

}

/* VOLVER A ESFERA */

function volverEsfera(){

let pos=particles.geometry.attributes.position.array

for(let i=0;i<particleCount*3;i++){

pos[i]=original[i]

}

particles.geometry.attributes.position.needsUpdate=true

}

/* RESPONSIVE */

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
