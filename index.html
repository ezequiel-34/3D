<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IA Partículas</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

#chat{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:500px;
display:flex;
}

#chat input{
flex:1;
padding:14px;
border-radius:25px;
border:none;
font-size:16px;
}

#chat button{
margin-left:10px;
padding:14px 20px;
border:none;
border-radius:25px;
background:#00ffff;
font-weight:bold;
}

</style>

</head>

<body>

<div id="chat">

<input id="texto" placeholder="Escribe algo">

<button onclick="enviar()">Enviar</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<script>

let escena = new THREE.Scene()

let camara = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let render = new THREE.WebGLRenderer()

render.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(render.domElement)

camara.position.z = 5

let cantidad = 6000

let geo = new THREE.BufferGeometry()

let posiciones = new Float32Array(cantidad*3)

let esfera = []

for(let i=0;i<cantidad;i++){

let radio = 2

let t = Math.random()*Math.PI*2
let p = Math.acos((Math.random()*2)-1)

let x = radio*Math.sin(p)*Math.cos(t)
let y = radio*Math.sin(p)*Math.sin(t)
let z = radio*Math.cos(p)

posiciones[i*3] = x
posiciones[i*3+1] = y
posiciones[i*3+2] = z

esfera.push(x,y,z)

}

geo.setAttribute("position",new THREE.BufferAttribute(posiciones,3))

let mat = new THREE.PointsMaterial({
color:0x00ffff,
size:0.04
})

let puntos = new THREE.Points(geo,mat)

escena.add(puntos)

function animar(){

requestAnimationFrame(animar)

puntos.rotation.y += 0.002
puntos.rotation.x += 0.001

render.render(escena,camara)

}

animar()

function enviar(){

let texto = document.getElementById("texto").value

let palabras = texto.split(" ")

let indice = 0

function mostrar(){

if(indice >= palabras.length){

volver()

return

}

crearPalabra(palabras[indice])

indice++

setTimeout(mostrar,1500)

}

mostrar()

}

function crearPalabra(p){

let canvas = document.createElement("canvas")

canvas.width = 800
canvas.height = 200

let ctx = canvas.getContext("2d")

ctx.fillStyle = "white"
ctx.font = "bold 120px Arial"
ctx.textAlign = "center"

ctx.fillText(p,400,130)

let datos = ctx.getImageData(0,0,800,200).data

let pos = puntos.geometry.attributes.position.array

let contador = 0

for(let y=0;y<200;y+=5){

for(let x=0;x<800;x+=5){

let i = (y*800+x)*4

if(datos[i] > 200 && contador < cantidad){

let n = contador*3

pos[n] = (x-400)/100
pos[n+1] = (100-y)/100
pos[n+2] = 0

contador++

}

}

}

puntos.geometry.attributes.position.needsUpdate = true

}

function volver(){

let pos = puntos.geometry.attributes.position.array

for(let i=0;i<cantidad*3;i++){

pos[i] = esfera[i]

}

puntos.geometry.attributes.position.needsUpdate = true

}

window.addEventListener("resize",()=>{

camara.aspect = window.innerWidth/window.innerHeight
camara.updateProjectionMatrix()

render.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>

</html>
